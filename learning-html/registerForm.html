<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registor Form</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Ubuntu", sans-serif;
      }
    </style>
  </head>

  <body>
    <h1>AJJI Entertainment Subscription</h1>
    <p>Please fill your information</p>
    <form action="" method="get">
      <p>First Name</p>
      <label for="">
        <input type="text" name="fname" placeholder="Rhaenyra" required />
      </label>

      <p>Last Name</p>
      <label for="">
        <input type="text" name="lname" placeholder="Targaryen" required />
      </label>

      <p>Password</p>
      <label for="">
        <input type="password" required />
      </label>

      <p>E-mail</p>
      <label>
        <input type="email" placeholder="example@domain.com" required />
      </label>

      <!-- package options -->
      <p>Choose Your Plan</p>

      <label>
        <input type="radio" name="package" required />
        Free
      </label>
      <br />

      <label>
        <input type="radio" name="package" required />
        Premium 999 Bath - Lifetime
      </label>

      <!-- your interesting options -->
      <p>What's your interest?</p>
      <label for="">
        <input type="checkbox" name="interest" value="movie" />
        Watch Movie
      </label>
      <br />

      <label for="">
        <input type="checkbox" name="interest" value="music" />
        Listening Music
      </label>
      <br />

      <label for="">
        <input type="checkbox" name="interest" value="game" />
        Play Game
      </label>
      <br />

      <label for="">
        <input type="checkbox" name="interest" value="sport" />
        Sport
      </label>

      <!-- submit form-->
      <p>Sumit the form for Enjoy!</p>
      <button
        style="
          font-family:
            system-ui,
            -apple-system,
            BlinkMacSystemFont,
            &quot;Segoe UI&quot;,
            Roboto,
            Oxygen,
            Ubuntu,
            Cantarell,
            &quot;Open Sans&quot;,
            &quot;Helvetica Neue&quot;,
            sans-serif;
        "
      >
        Sent
      </button>
    </form>
  </body>
</html>
