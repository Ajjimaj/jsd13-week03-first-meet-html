<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Ubuntu", sans-serif;
      }
    </style>
  </head>

  <!-- body setting -->
  <body style="text-align: center">
    <h1 style="color: darkolivegreen;">Smurf Entertainment Subscription</h1>
    <br>

    <h2 style="font-size: larger; font-weight: 500;">Please fill your information</h2>
    <form action="" method="get">
    
    <div>
      <strong style="font-weight: 500;">First Name</strong>
      <label style="width: 100px; font-weight: bold; font-size: 16px;">
        <input
          type="text"
          name="fname"
          placeholder="Rhaenyra"
          style="padding: 6px; border-radius: 5px; border:1px solid #716a6a"
          required
        />
      </label>
    </div>

      <p><strong style="font-weight: 500;">Last Name</strong>
      <label>
        <input 
          type="text"
          name="lname"
          placeholder="Targaryen"
          style="padding: 6px; border-radius: 5px; border:1px solid #716a6a"
          required
        />
      </p>
      </label>

      <p><strong style="font-weight: 500;">Password</strong>
      <label>
        <input 
          type="password"
          style="padding: 6px; border-radius: 5px; border:1px solid #716a6a" 
          required
        />
      </p>
      </label>

      <p><strong style="font-weight: 500;">E-mail</strong>
      <label>
        <input 
          type="email"
          placeholder="example@domain.com"
          style="padding: 6px; border-radius: 5px; border:1px solid #716a6a"
          required />
      </p>
      </label>
      <br>

    <!-- package options -->
    <h2 style="font-size: larger; font-weight: 500;">Choose Your Plan</h2>
    
    <div style="display: inline-block; text-align: left; margin-bottom: 10px"
      <label>
        <input type="radio" name="package" required />
        Free
      </label>
      <br />

      <label>
        <input type="radio" name="package" required />
        Premium 999 Bath - Lifetime
      </label>
    </div>

    <!-- your interesting options -->
    <h2 style="font-size: larger; font-weight: 500;">What's your interest?</h2>

    <div style="display: inline-block; text-align: left; margin-bottom: 10px">
    <label for="">
      <input type="checkbox" name="interest" value="movie" />
        Watch Movie
      </label>
      <br />

      <label for="">
        <input type="checkbox" name="interest" value="music" />
        Listening Music
      </label>
      <br />

      <label for="">
        <input type="checkbox" name="interest" value="game" />
        Play Game
      </label>
      <br />

      <label for="">
        <input type="checkbox" name="interest" value="sport" />
        Sport
      </label>
    </div>

      <!-- submit form-->
      <p>Let's enjoy your plan!</p>
      <button style="font-family: monospace">Sent</button>
    </form>
  </body>
</html>
