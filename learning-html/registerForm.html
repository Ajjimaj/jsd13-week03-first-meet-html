<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registor Form</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Ubuntu", sans-serif;
      }
    </style>
  </head>
  <body>
    <h1>Ajjma</h1>
    <p>Subscribe Here</p>
    <form action="/api/user" method="get">
      <p>Name</p>
      <input type="text" name="cname" required />

      <p>E-mail</p>
      <input type="email" />

      <!-- soup options  -->
      <p>Select Soup</p>

      <label>
        <input type="radio" name="soup" />
        Mala Soup
      </label>

      <label>
        <input type="radio" name="soup" />
        หม่าล่านมสด
      </label>

      <label>
        <input type="radio" name="soup" />
        Japanese Black Soup
      </label>

      <input type="radio" name="soup" id="sukisoup" />
      <label for="sukisoup">ซุปสุกี้</label>

      <!-- ingreditents options-->
      <p>Select Ingredients</p>
      <label for="">
        <input type="checkbox" name="meat" value="pork" />
        Pork
      </label>

      <label for="">
        <input type="checkbox" name="meat" value="chicken" />
        Chicken
      </label>

      <label for="">
        <input type="checkbox" name="vegetable" value="mushroom" />
        Mushroom
      </label>

      <label for="">
        <input type="checkbox" name="vegetable" value="bokchoy" />
        Bokchoy
      </label>

      <!-- submit form-->
      <p>Let's enjoy your meal!</p>
      <button>Submit</button>
    </form>
  </body>
</html>
